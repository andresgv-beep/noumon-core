<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cloud" x1="0.05" y1="0.15" x2="0.95" y2="0.85">
      <stop offset="0" stop-color="#4a7df0"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f0468a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#c026d3"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="boltHi" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- NUBE (bumps limpios + base) -->
  <g fill="url(#cloud)">
    <circle cx="184" cy="232" r="64"/>
    <circle cx="256" cy="188" r="86"/>
    <circle cx="332" cy="220" r="76"/>
    <circle cx="300" cy="266" r="64"/>
    <rect x="128" y="230" width="256" height="112" rx="56"/>
  </g>

  <!-- separación: hueco oscuro (chaflán) detrás del rayo -->
  <path fill="#141018" d="M300 250
    q14 0 8 14 l-20 48 h44 q16 0 6 15 L246 470 q-10 12 -6 -6 l22 -70 h-44 q-16 0 -8 -15 l46 -112 q4 -10 12 -14 Z"/>

  <!-- RAYO con degradado propio rosa/magenta -->
  <path fill="url(#bolt)" d="M306 262
    q10 0 6 11 l-22 52 h42 q13 0 5 13 L250 452 q-8 10 -5 -5 l22 -66 h-42 q-13 0 -7 -12 l44 -104 q4 -8 11 -11 Z"/>

  <!-- reflejo/faceta clara en un lado del rayo -->
  <path fill="url(#boltHi)" d="M306 262 q10 0 6 11 l-22 52 h-20 l30 -63 q3 -7 6 -0 Z" opacity="0.8"/>
</svg>
