<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>📚</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#141018" />
    <meta name="application-name" content="Noumon" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Noumon</title>
    <script>
      // Anti-parpadeo: fija luz (data-theme), piel (data-skin) y acento antes
      // de cargar el bundle. Debe reflejar la misma lógica de theme.svelte.js.
      (function () {
        try {
          var c = localStorage.getItem('noumon-theme') || 'dark';
          var r = c === 'system'
            ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : c;
          var root = document.documentElement;
          root.setAttribute('data-theme', r);
          var skin = localStorage.getItem('noumon-skin');
          root.setAttribute('data-skin', skin === 'retro' ? 'retro' : 'modern');
          var accent = localStorage.getItem('noumon-accent');
          if (accent && /^#[0-9a-f]{6}$/i.test(accent)) root.style.setProperty('--accent', accent);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script type="module">
      if (import.meta.env.PROD && 'serviceWorker' in navigator && !window.__NOUMON_LIBRARY_SHELL__) {
        addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function () {});
        });
      }
    </script>
  </body>
</html>
